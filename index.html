<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愛心集點卡 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── (1) 的顏色系統 ── */
    :root {
      --pink:       #FF6B9D;
      --pink-light: #FFB3CE;
      --pink-pale:  #FFF0F5;
      --rose:       #FF4081;
      --peach:      #FFD6E7;
      --hot:        #E91E8C;
      --bg:         #FFF5F9;
      --white:      #FFFFFF;
      --text:       #5A2D45;
      --text-light: #C4829E;
    }

    body {
      background: var(--bg);
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px;
      background-image:
        radial-gradient(circle at 10% 15%, rgba(255,107,157,0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, rgba(233,30,140,0.08) 0%, transparent 40%);
    }

    .bg-hearts { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
    .bg-heart { position:absolute; opacity:0.06; animation:floatHeart linear infinite; color:var(--pink); }
    @keyframes floatHeart {
      0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
      10%  { opacity:0.06; } 90% { opacity:0.06; }
      100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
    }

    .wrapper { position:relative; z-index:1; width:100%; max-width:480px; }

    .header { text-align:center; margin-bottom:18px; }
    .header-title { font-size:2rem; font-weight:900; color:var(--pink); letter-spacing:0.05em; text-shadow:0 2px 12px rgba(255,107,157,0.3); }
    .header-sub { font-size:0.78rem; color:var(--text-light); font-weight:700; margin-top:4px; letter-spacing:0.18em; }

    .card {
      background:var(--white); border-radius:28px; padding:26px 24px 22px;
      box-shadow:0 4px 0 var(--pink-light), 0 10px 40px rgba(255,107,157,0.18), inset 0 1px 0 rgba(255,255,255,1);
      border:2px solid rgba(255,107,157,0.2); position:relative;
    }
    .card::before, .card::after { content:'♥'; position:absolute; font-size:0.9rem; color:rgba(255,107,157,0.2); }
    .card::before { top:14px; left:18px; }
    .card::after  { bottom:14px; right:18px; }

    .points-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .points-display { display:flex; align-items:baseline; gap:4px; }
    .points-big { font-size:3rem; font-weight:900; color:var(--pink); line-height:1; transition:transform 0.3s cubic-bezier(0.34,1.8,0.64,1); text-shadow:0 2px 10px rgba(255,107,157,0.3); }
    .points-big.pop { transform:scale(1.3); }
    .points-of { font-size:1rem; color:var(--text-light); font-weight:700; }
    .heart-label { font-size:1.8rem; animation:heartbeat 2s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100%{transform:scale(1);} 15%{transform:scale(1.2);}
      30%{transform:scale(1);} 45%{transform:scale(1.1);} 60%{transform:scale(1);}
    }

    .progress-section { margin-bottom:20px; }
    .progress-track { height:10px; background:var(--peach); border-radius:99px; overflow:visible; position:relative; }
    .progress-fill {
      height:100%; background:linear-gradient(90deg,var(--pink-light),var(--pink),var(--rose));
      border-radius:99px; transition:width 0.55s cubic-bezier(0.4,0,0.2,1);
      position:relative; box-shadow:0 2px 8px rgba(255,107,157,0.4); min-width:0;
    }
    .progress-fill::after { content:'♥'; position:absolute; right:-8px; top:50%; transform:translateY(-50%); font-size:0.85rem; color:var(--pink); }
    .progress-hint { text-align:right; font-size:0.72rem; color:var(--text-light); font-weight:700; margin-top:8px; }

    .stamp-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:7px; margin-bottom:22px; }
    .slot {
      aspect-ratio:1; border-radius:12px;
      border:2px dashed rgba(255,107,157,0.3);
      background:rgba(255,240,245,0.6);
      display:flex; align-items:center; justify-content:center;
      position:relative; transition:border-color 0.3s, background 0.3s;
    }
    .slot-num { font-size:0.6rem; font-weight:800; color:rgba(196,130,158,0.5); }
    .slot-heart { position:absolute; font-size:1.25rem; opacity:0; transform:scale(0); }

    .slot.full { border:2px solid rgba(255,107,157,0.35); background:linear-gradient(135deg,#FFF0F5,#FFE0EC); }
    .slot.full .slot-heart { opacity:1; transform:scale(1); }
    .slot.full .slot-num   { display:none; }
    .slot.just-added .slot-heart { animation:heartPop 0.45s cubic-bezier(0.34,1.7,0.64,1) forwards; }
    @keyframes heartPop {
      0%  { opacity:0; transform:scale(0) rotate(-15deg); }
      60% { opacity:1; transform:scale(1.25) rotate(5deg); }
      100%{ opacity:1; transform:scale(1) rotate(0deg); }
    }
    .slot.half { border:2px solid rgba(255,158,196,0.5); background:linear-gradient(135deg,#FFF5F9,#FFDCEC); }
    .slot.half .slot-heart { opacity:1; transform:scale(1); filter:saturate(0.45) brightness(1.25); }
    .slot.half .slot-num { display:none; }
    .slot.just-half .slot-heart { animation:heartPop 0.45s cubic-bezier(0.34,1.7,0.64,1) forwards; }

    .divider { display:flex; align-items:center; gap:8px; margin-bottom:18px; }
    .div-line { flex:1; height:1.5px; background:linear-gradient(90deg,transparent,rgba(255,107,157,0.25),transparent); }
    .div-hearts { font-size:0.75rem; letter-spacing:3px; color:rgba(255,107,157,0.4); }

    .btn-group { display:flex; gap:10px; margin-bottom:10px; }
    .btn {
      flex:1; padding:15px 10px; border:none; border-radius:16px;
      font-family:'Nunito',sans-serif; font-weight:800; font-size:0.95rem;
      cursor:pointer; transition:transform 0.15s, box-shadow 0.15s, filter 0.15s;
      position:relative; overflow:hidden; letter-spacing:0.02em;
    }
    .btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 60%); pointer-events:none; }
    .btn:hover:not(:disabled)  { transform:translateY(-3px); filter:brightness(1.05); }
    .btn:active:not(:disabled) { transform:translateY(0) scale(0.97); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-full { background:linear-gradient(135deg,var(--pink) 0%,var(--rose) 100%); color:white; box-shadow:0 5px 18px rgba(255,107,157,0.45),0 2px 0 rgba(233,30,140,0.3); }
    .btn-full:hover:not(:disabled) { box-shadow:0 8px 24px rgba(255,107,157,0.55); }
    .btn-half { background:linear-gradient(135deg,#FFB3CE 0%,#FF85B5 100%); color:white; box-shadow:0 5px 18px rgba(255,107,157,0.3),0 2px 0 rgba(255,107,157,0.25); }
    .btn-icon  { font-size:1.1rem; display:block; margin-bottom:3px; }
    .btn-label { display:block; font-size:0.72rem; opacity:0.9; }

    .btn-reset {
      width:100%; padding:12px; background:transparent;
      border:2px solid rgba(255,107,157,0.25); border-radius:14px;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem;
      color:var(--text-light); cursor:pointer;
      transition:background 0.2s, border-color 0.2s, transform 0.15s, color 0.2s;
      letter-spacing:0.05em;
    }
    .btn-reset:hover  { background:rgba(255,107,157,0.07); border-color:rgba(255,107,157,0.45); color:var(--pink); transform:translateY(-1px); }
    .btn-reset:active { transform:scale(0.98); }

    .btn-undo {
      width:100%; padding:12px; background:transparent;
      border:2px solid rgba(255,107,157,0.18); border-radius:14px;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem;
      color:var(--text-light); cursor:pointer; margin-bottom:10px;
      transition:background 0.2s, border-color 0.2s, transform 0.15s, color 0.2s;
      letter-spacing:0.05em;
    }
    .btn-undo:hover:not(:disabled)  { background:rgba(255,107,157,0.07); border-color:rgba(255,107,157,0.45); color:var(--pink); transform:translateY(-1px); }
    .btn-undo:active:not(:disabled) { transform:scale(0.98); }
    .btn-undo:disabled { opacity:0.3; cursor:not-allowed; }

    .complete-banner {
      display:none; background:linear-gradient(135deg,#FF6B9D,#E91E8C);
      border-radius:18px; padding:18px; text-align:center; margin-bottom:18px;
      animation:bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 6px 24px rgba(255,107,157,0.5);
    }
    .complete-banner.show { display:block; }
    @keyframes bounceIn {
      0%  { transform:scale(0.7) translateY(-20px); opacity:0; }
      100%{ transform:scale(1) translateY(0); opacity:1; }
    }
    .complete-emoji { font-size:2.2rem; display:block; animation:heartbeat 1s ease-in-out infinite; }
    .complete-title { font-size:1.25rem; font-weight:900; color:white; margin:6px 0 4px; text-shadow:0 1px 4px rgba(0,0,0,0.15); }
    .complete-desc  { font-size:0.75rem; color:rgba(255,255,255,0.85); font-weight:600; letter-spacing:0.08em; }

    .legend { display:flex; gap:14px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:0.68rem; color:var(--text-light); font-weight:700; }
    .legend-dot { width:14px; height:14px; border-radius:4px; border:1.5px dashed rgba(233,30,140,0.4); display:flex; align-items:center; justify-content:center; font-size:0.65rem; }

    .float-heart { position:fixed; font-size:1.2rem; pointer-events:none; z-index:999; animation:floatUp 1.2s ease-out forwards; }
    @keyframes floatUp {
      0%  { opacity:1; transform:translateY(0) scale(1); }
      100%{ opacity:0; transform:translateY(-130px) scale(0.5) rotate(20deg); }
    }

    /* Reset Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(90,45,69,0.35); backdrop-filter:blur(4px); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal { background:white; border-radius:24px; padding:32px 28px 24px; text-align:center; max-width:300px; width:90%; box-shadow:0 8px 40px rgba(255,107,157,0.3); border:2px solid rgba(255,107,157,0.2); animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes modalIn { from{transform:scale(0.75) translateY(20px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
    .modal-emoji  { font-size:2.5rem; display:block; margin-bottom:10px; }
    .modal-title  { font-size:1.1rem; font-weight:900; color:var(--text); margin-bottom:8px; }
    .modal-desc   { font-size:0.82rem; color:var(--text-light); font-weight:600; line-height:1.5; margin-bottom:22px; }
    .modal-btns   { display:flex; gap:10px; }
    .modal-cancel { flex:1; padding:12px; background:transparent; border:2px solid rgba(255,107,157,0.25); border-radius:12px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.9rem; color:var(--text-light); cursor:pointer; transition:background 0.2s; }
    .modal-cancel:hover { background:rgba(255,107,157,0.06); }
    .modal-confirm { flex:1; padding:12px; background:linear-gradient(135deg,var(--pink),var(--rose)); border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem; color:white; cursor:pointer; box-shadow:0 4px 14px rgba(255,107,157,0.4); transition:filter 0.2s,transform 0.15s; }
    .modal-confirm:hover  { filter:brightness(1.08); transform:translateY(-1px); }
    .modal-confirm:active { transform:scale(0.97); }

    /* ══ 慶祝特效 (取自(2)，色系改為(1)的粉紅) ══ */
    @keyframes cardShake {
      0%,100%{ transform:translateX(0) rotate(0deg); }
      15%    { transform:translateX(-6px) rotate(-1.5deg); }
      30%    { transform:translateX(6px)  rotate(1.5deg); }
      45%    { transform:translateX(-4px) rotate(-1deg); }
      60%    { transform:translateX(4px)  rotate(1deg); }
      75%    { transform:translateX(-2px) rotate(-0.5deg); }
    }
    .card.celebrate { animation:cardShake 0.55s ease; }

    .flash-overlay {
      position:fixed; inset:0;
      background:radial-gradient(circle,rgba(255,255,255,0.95) 0%,rgba(255,200,230,0.6) 60%,transparent 100%);
      pointer-events:none; z-index:998; opacity:0;
    }
    .flash-overlay.flash { animation:flashAnim 0.6s ease-out forwards; }
    @keyframes flashAnim { 0%{opacity:1;} 100%{opacity:0;} }

    .confetti { position:fixed; width:10px; height:10px; border-radius:2px; pointer-events:none; z-index:997; animation:confettiFall linear forwards; }
    @keyframes confettiFall {
      0%  { transform:translateY(-20px) rotate(0deg) scale(1); opacity:1; }
      80% { opacity:1; }
      100%{ transform:translateY(110vh) rotate(720deg) scale(0.6); opacity:0; }
    }

    .celeb-overlay { display:none; position:fixed; inset:0; z-index:200; align-items:center; justify-content:center; pointer-events:none; }
    .celeb-overlay.show { display:flex; }
    .celeb-card {
      background:white; border-radius:32px; padding:40px 36px 32px; text-align:center;
      box-shadow:0 20px 80px rgba(255,107,157,0.45), 0 4px 0 var(--pink-light);
      border:2px solid rgba(255,107,157,0.3);
      animation:celebCardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:all; max-width:320px; width:90%;
    }
    @keyframes celebCardIn {
      0%  { transform:scale(0.5) rotate(-5deg); opacity:0; }
      100%{ transform:scale(1) rotate(0deg);    opacity:1; }
    }
    .celeb-emoji-row { font-size:2.8rem; letter-spacing:6px; display:block; margin-bottom:12px; animation:bounceRow 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.15s both; }
    @keyframes bounceRow {
      0%  { transform:scale(0) translateY(20px); }
      100%{ transform:scale(1) translateY(0); }
    }
    .celeb-title {
      font-size:1.6rem; font-weight:900;
      background:linear-gradient(135deg,var(--pink),var(--hot),var(--rose));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:8px;
    }
    .celeb-desc { font-size:0.85rem; color:var(--text-light); font-weight:600; line-height:1.6; margin-bottom:24px; }
    .celeb-close {
      padding:13px 32px; background:linear-gradient(135deg,var(--pink),var(--rose));
      border:none; border-radius:14px; font-family:'Nunito',sans-serif;
      font-weight:800; font-size:1rem; color:white; cursor:pointer;
      box-shadow:0 4px 16px rgba(255,107,157,0.5); transition:transform 0.15s,filter 0.15s;
    }
    .celeb-close:hover  { transform:translateY(-2px); filter:brightness(1.07); }
    .celeb-close:active { transform:scale(0.97); }

    .burst-heart { position:fixed; font-size:1.5rem; pointer-events:none; z-index:996; animation:burstOut ease-out forwards; }
    @keyframes burstOut {
      0%  { opacity:1; transform:translate(0,0) scale(1); }
      100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.4) rotate(var(--tr)); }
    }
  </style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <span class="modal-emoji">💔</span>
    <div class="modal-title">確定要重置嗎？</div>
    <div class="modal-desc">所有愛心點數將清空，<br>從 0 重新開始集點喔！</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" onclick="confirmReset()">確定重置</button>
    </div>
  </div>
</div>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="celeb-overlay" id="celebOverlay">
  <div class="celeb-card">
    <span class="celeb-emoji-row">🎉✨💖</span>
    <div class="celeb-title">集滿 30 點啦！</div>
    <div class="celeb-desc">你太棒了 🌈💕<br>請向小寶出示此畫面兌換專屬獎勵</div>
    <button class="celeb-close" onclick="closeCeleb()">太開心了！♥</button>
  </div>
</div>

<div class="wrapper">
  <div class="header">
    <div class="header-title">💕 愛心集點卡</div>
    <div class="header-sub">HEART LOYALTY CARD</div>
  </div>

  <div class="card">
    <div class="complete-banner" id="completeBanner">
      <span class="complete-emoji">🎉</span>
      <div class="complete-title">集滿啦！好開心 ♥</div>
      <div class="complete-desc">請向小寶出示此畫面兌換獎勵 ✨</div>
    </div>

    <div class="points-row">
      <div class="points-display">
        <span class="points-big" id="pointsNum">0</span>
        <span class="points-of">/ 30</span>
      </div>
      <div class="heart-label">💗</div>
    </div>

    <div class="progress-section">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-hint" id="progressHint">還差 30 點 🌸</div>
    </div>

    <div class="stamp-grid" id="stampGrid"></div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-hearts">♥ ♥ ♥</div>
      <div class="div-line"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-full" id="btnFull" onclick="addPoints(1)">
        <span class="btn-icon">❤️</span>
        <span>＋ 1 點</span>
        <span class="btn-label">完整集點</span>
      </button>
      <button class="btn btn-half" id="btnHalf" onclick="addPoints(0.2)">
        <span class="btn-icon">🩷</span>
        <span>＋ 0.2 點</span>
        <span class="btn-label">小額集點</span>
      </button>
    </div>

    <button class="btn-undo" id="btnUndo" onclick="undoPoint()" disabled>↩ 返回上一步</button>
    <button class="btn-reset" onclick="openModal()">🗑️ 重置所有點數</button>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot">❤️</div> 完整點</div>
      <div class="legend-item"><div class="legend-dot" style="filter:saturate(0.4) brightness(1.3)">🩷</div> 0.2 點</div>
    </div>
  </div>
</div>

<script>
  const TOTAL = 30;
  let points = parseFloat(localStorage.getItem('heartPoints') || '0');
  let lastPoints = points; // for undo

  function buildGrid() {
    const grid = document.getElementById('stampGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.id = 'slot-' + i;
      const num = document.createElement('span');
      num.className = 'slot-num';
      num.textContent = i;
      const heart = document.createElement('span');
      heart.className = 'slot-heart';
      heart.textContent = '❤️';
      slot.appendChild(num);
      slot.appendChild(heart);
      grid.appendChild(slot);
    }
  }

  function updateUI(animateSlot, isHalf) {
    const r = Math.round(points * 10) / 10;
    const numEl = document.getElementById('pointsNum');
    numEl.textContent = r % 1 === 0 ? r : r.toFixed(1);
    if (animateSlot != null) {
      numEl.classList.add('pop');
      setTimeout(() => numEl.classList.remove('pop'), 350);
    }

    const pct = Math.min((points / TOTAL) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const rem = Math.round((TOTAL - points) * 10) / 10;
    document.getElementById('progressHint').textContent =
      points >= TOTAL ? '集滿啦！🎉' : `還差 ${rem} 點 🌸`;

    for (let i = 1; i <= TOTAL; i++) {
      const slot = document.getElementById('slot-' + i);
      const heart = slot.querySelector('.slot-heart');
      slot.classList.remove('full', 'half', 'just-added', 'just-half');
      if (points >= i) {
        slot.classList.add('full');
        heart.textContent = '❤️';
        heart.style.filter = '';
        if (animateSlot === i && !isHalf) slot.classList.add('just-added');
      } else if (i === Math.floor(points) + 1 && points % 1 > 0.01) {
        slot.classList.add('half');
        heart.textContent = '🩷';
        if (animateSlot === i && isHalf) slot.classList.add('just-half');
      }
    }

    const done = points >= TOTAL;
    const bannerWasHidden = !document.getElementById('completeBanner').classList.contains('show');
    document.getElementById('completeBanner').classList.toggle('show', done);
    document.getElementById('btnFull').disabled = done;
    document.getElementById('btnHalf').disabled = done;
    document.getElementById('btnUndo').disabled = (points <= 0);
    localStorage.setItem('heartPoints', points);

    if (done && bannerWasHidden && animateSlot != null) {
      triggerCelebration();
    }
  }

  function addPoints(amount) {
    if (points >= TOTAL) return;
    lastPoints = points;
    points = Math.min(Math.round((points + amount) * 10) / 10, TOTAL);
    const isHalf = amount < 1;
    let animSlot;
    if (!isHalf) {
      animSlot = Math.floor(points) === points ? points : Math.ceil(points);
    } else {
      animSlot = points % 1 > 0.01 ? Math.floor(points) + 1 : Math.floor(points);
    }
    updateUI(animSlot, isHalf);
    spawnFloatingHearts(isHalf);
  }

  function undoPoint() {
    if (points <= 0) return;
    points = lastPoints;
    lastPoints = 0;
    updateUI(null, false);
  }

  function openModal()  { document.getElementById('modalOverlay').classList.add('show'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  function confirmReset() {
    closeModal();
    if (points === 0) return;
    lastPoints = 0;
    points = 0;
    updateUI(null, false);
    document.querySelectorAll('.slot.full, .slot.half').forEach((s, i) => {
      setTimeout(() => {
        s.style.transition = 'transform 0.3s, opacity 0.3s';
        s.style.transform = 'scale(0.6)';
        s.style.opacity = '0.2';
        setTimeout(() => { s.style.transform = ''; s.style.opacity = ''; }, 320);
      }, i * 18);
    });
  }

  function spawnFloatingHearts(isHalf) {
    const count = isHalf ? 2 : 4;
    const emojis = isHalf ? ['🩷','💕'] : ['❤️','💖','💗','💓'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'float-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = (25 + Math.random() * 50) + '%';
        h.style.bottom = '35%';
        h.style.animationDuration = (0.9 + Math.random() * 0.5) + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1500);
      }, i * 110);
    }
  }

  function closeCeleb() {
    document.getElementById('celebOverlay').classList.remove('show');
  }

  /* ── 慶祝特效：邏輯來自 (2)，顏色全改為 (1) 的粉紅系 ── */
  function triggerCelebration() {
    // 1. 白閃
    const fl = document.getElementById('flashOverlay');
    fl.classList.add('flash');
    setTimeout(() => fl.classList.remove('flash'), 700);

    // 2. 卡片震動
    const card = document.querySelector('.card');
    card.classList.add('celebrate');
    setTimeout(() => card.classList.remove('celebrate'), 600);

    // 3. 紙花雨 80 片（粉紅色系）
    const colors = ['#FF6B9D','#FFB3CE','#FF85B5','#FF4081','#FFD6E7','#E91E8C','#FFC0D9','#FF8FAB'];
    const shapes = ['circle','square','diamond'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        c.style.left  = (Math.random() * 100) + 'vw';
        c.style.top   = '-20px';
        c.style.width  = (7 + Math.random() * 9) + 'px';
        c.style.height = (7 + Math.random() * 9) + 'px';
        if (shape === 'circle')  c.style.borderRadius = '50%';
        if (shape === 'diamond') c.style.transform = 'rotate(45deg)';
        const dur = 1.8 + Math.random() * 2.0;
        c.style.animationDuration = dur + 's';
        c.style.animationDelay    = (Math.random() * 0.8) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), (dur + 1.2) * 1000);
      }, i * 20);
    }

    // 4. 放射愛心（從卡片中心爆射 14 個）
    const burstEmojis = ['💖','💗','💕','✨','🌈','💝','🎊','⭐'];
    const cardRect = card.getBoundingClientRect();
    const cx = cardRect.left + cardRect.width / 2;
    const cy = cardRect.top  + cardRect.height / 2;
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('div');
      h.className = 'burst-heart';
      h.textContent = burstEmojis[i % burstEmojis.length];
      const angle = (i / 14) * 360;
      const dist  = 130 + Math.random() * 100;
      h.style.setProperty('--tx', Math.cos(angle * Math.PI / 180) * dist + 'px');
      h.style.setProperty('--ty', Math.sin(angle * Math.PI / 180) * dist + 'px');
      h.style.setProperty('--tr', (Math.random() * 180 - 90) + 'deg');
      h.style.left = cx + 'px';
      h.style.top  = cy + 'px';
      h.style.animationDuration = (0.8 + Math.random() * 0.5) + 's';
      h.style.animationDelay    = (i * 0.04) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1800);
    }

    // 5. 彈出慶祝視窗
    setTimeout(() => {
      document.getElementById('celebOverlay').classList.add('show');
    }, 600);
  }

  function initBgHearts() {
    const c = document.getElementById('bgHearts');
    const chars = ['♥','❤','♡'];
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('div');
      h.className = 'bg-heart';
      h.textContent = chars[i % chars.length];
      h.style.left = (Math.random() * 100) + '%';
      h.style.fontSize = (12 + Math.random() * 30) + 'px';
      const dur = 14 + Math.random() * 14;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay    = (-Math.random() * dur) + 's';
      c.appendChild(h);
    }
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  initBgHearts();
  buildGrid();
  updateUI(null, false);
</script>
</body>
</html>
